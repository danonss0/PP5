<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>title</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script>
    function wyslij() {
      const klient = {
        nazwa: document.getElementById("nazwafirmy").value,
        nip: document.getElementById("NIP").value,
        miasto: document.getElementById("miasto").value,
        ulica: document.getElementById("ulica").value,
        numerDomu: document.getElementById("numerDomu").value,
        numerMieszkania: document.getElementById("numerMieszkania").value,
        kod: document.getElementById("kodPocztowy").value,
        uwagi: document.getElementById("uwagi").value,
        branza: document.getElementById("branza").value,
        aktywny: document.getElementById("aktywny").value

      };

      console.log(klient);
    }

    function dodaj(event) {
      event.preventDefault();
      document.getElementById("nazwafirmy").value("moja firma)");

      
    }
  </script>
</head>

<body>
  <h1>Dodaj klienta do bazy</h1>
  <div class="container">
    <br>
    Wprowadz klienta:
    <form onsubmit="wyslij()">
      <div class="mb-2">
        <div class="col-sm-10">
          <label for="nazwafirmy" class="form-label">Nazwa firmy</label>
          <input type="text" class="col-sm-2 form-label" id="nazwafirmy" required>
        </div>
        <div class="col-sm-10">
          <label for="NIP" class="form-label">NIP</label>
          <input type="number" class="col-sm-2 form-label" id="NIP" required>
        </div>
        <div class="col-sm-10">
          <label for="miasto" class="form-label">Miasto</label>
          <input type="text" class="col-sm-2 form-label" id="miasto" required>
        </div>
        <div class="col-sm-10">
          <label for="ulica" class="form-label">Ulica</label>
          <input type="text" class="col-sm-2 form-label" id="ulica" required>
        </div>
        <div class="col-sm-10">
          <label for="numerdomu" class="form-label">Numer domu</label>
          <input type="number" class="col-sm-2 form-label" id="numerDomu" required>
        </div>
        <div class="col-sm-10">
          <label for="numermieszkania" class="form-label">Numer mieszkania</label>
          <input type="number" class="col-sm-2 form-label" id="numerMieszkania">
        </div>
        <div class="col-sm-10">
          <label for="kodPocztowy" class="form-label">Kod pocztowy</label>
          <input type="test" class="col-sm-2 form-label" id="kodPocztowy" required>
        </div>
        <div class="col-sm-10">
          <label for="uwagi" class="form-label">Uwagi</label>
          <input type="textarea" class="col-sm-4 form-label" id="uwagi">
        </div>
        <div class="col-sm-10">
          <select class="form-select" aria-label="Default select example" id="branza" required>
            <option selected>Branża</option>
            <option value="IT">IT</option>
            <option value="Nie IT">Nie IT</option>
            <option value="Też nie IT">Też nie IT</option>
          </select>
        </div>
        <div class="col-sm-10">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="aktywny" required>
            <label class="form-check-label" for="flexCheckDefault">
              Aktywny
            </label>
          </div>
        </div>
        <div class="col-12"><br>
          <button class="btn btn-primary" type="submit">Dodaj</button>
        </div>
        <div class="col-12"><br>
          <button class="btn btn-primary" type="button" onclick="dodaj(event)">Wstaw dane</button>
        </div>


      </div>

  </div>
  </form>

</body>

</html>
